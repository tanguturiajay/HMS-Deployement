<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-header">
    <a routerLink="/dashboard/overview" class="sidebar-logo">
      <span class="logo-mark">H</span>
      <div class="logo-text">
        <span class="logo-title">{{ title }}</span>
        @if (subtitle) {
          <span class="logo-subtitle">{{ subtitle }}</span>
        }
      </div>
    </a>

    <button
      type="button"
      class="sidebar-toggle"
      (click)="onToggle()"
      aria-label="Toggle sidebar"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    @for (item of menuItems(); track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="sidebar-link"
        (click)="onNavigate()"
      >
        <span class="sidebar-link-icon" [innerHTML]="iconFor(item)"></span>
        <span class="sidebar-link-label">{{ item.name }}</span>
      </a>
    }
  </nav>

  <!-- User footer with dropdown -->
  <div class="sidebar-footer">
    @if (userMenuOpen()) {
      <div class="user-dropdown">
        <button class="dropdown-item dropdown-logout" (click)="logout()">
          <svg class="dropdown-logout-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span>Logout</span>
        </button>
      </div>
    }

    <button
      type="button"
      class="sidebar-user"
      [class.open]="userMenuOpen()"
      (click)="toggleUserMenu()"
    >
      <div class="user-avatar">{{ getUserInitial() }}</div>
      <div class="user-info">
        <p class="user-name">{{ getDisplayName() }}</p>
        <p class="user-role">{{ getDesignation() }}</p>
      </div>
      <span class="user-caret" [class.up]="userMenuOpen()" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </span>
    </button>
  </div>
</aside>
