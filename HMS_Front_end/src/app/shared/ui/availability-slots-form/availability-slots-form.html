<div class="slots-section">
  <div class="slots-header">
    <span class="form-label">Availability Slots <span class="form-required">*</span></span>
  </div>

  @for (slot of formArray.controls; track slot; let i = $index) {
  <div class="slot-row" [formGroup]="slotGroup(i)">
    <label class="slot-field slot-field-day">
      <span class="slot-field-name">Day</span>
      <select formControlName="day" class="form-select">
        @for (day of weekDays; track day) {
        <option [value]="day">{{ day }}</option>
        }
      </select>
    </label>
    <label class="slot-field slot-field-time">
      <span class="slot-field-name">Start time</span>
      <input type="time" formControlName="startTime" class="form-input" />
    </label>
    <span class="slot-sep">to</span>
    <label class="slot-field slot-field-time">
      <span class="slot-field-name">End time</span>
      <input type="time" formControlName="endTime" class="form-input" />
    </label>
    @if (formArray.length > 1) {
    <button type="button" class="slot-remove" (click)="removeSlot.emit(i)">
      <span aria-hidden="true">✕</span>
      <span class="sr-only">Remove slot</span>
    </button>
    }
  </div>
  @if (slot.hasError('slotTimeOrder')) {
  <p class="form-error slot-error">Start time must be before end time</p>
  }
  }

  @if (formArray.errors?.['slotConflict']; as slotConflict) {
  <p class="form-error slot-error">{{ slotConflict }}</p>
  }

  <button type="button" class="btn btn-secondary btn-sm slots-add" (click)="addSlot.emit()">+ Add Slot</button>
</div>
